[project]
id = "peanutguard"
name = "PeanutGuard AI"

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 16

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://peanutguard.app"]
jwt_expiry = 3600
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = false

[storage]
file_size_limit = "1MB"
